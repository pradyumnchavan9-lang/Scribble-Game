<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>

<body>

<h2>Scribble Game Test</h2>

<button onclick="joinAlice()">Join as Alice</button>
<button onclick="joinBob()">Join as Bob</button>
<pre id="messages"></pre>
<canvas id="drawBoard" width="800" height="600"></canvas>

<form onSubmit="handleSubmit(event)">
    <label>Guess Word: </label>
    <input id="guess" type="text" placeholder="Enter your Guess"/>
    <button type="Submit">Guess</button>
</form>

<div id="guessWord"></div>
<button onclick="startGame()">Start Game</button>

<script>

    let stompClient = null;
    let username = "";
    let drawer = "";
    let roomId = "";
    let prevX = null;
    let prevY = null;

    function connect() {

        let socket = new SockJS("http://localhost:8080/ws");
        stompClient = Stomp.over(socket);

        stompClient.connect(
            { username: username }, // username sent in CONNECT
            function(frame){

                console.log("Connected " + frame);

                // Private drawer message
                stompClient.subscribe("/user/queue/private",function(message){
                    let msg = JSON.parse(message.body);
                    document.getElementById("guessWord").innerHTML = "Your word: " + msg.content;
                });

                // Game room events
                stompClient.subscribe("/topic/room/" + roomId,function(message){
                    let msg = JSON.parse(message.body);

                    if(msg.type == "DRAW_EVENT"){
                        drawPoint(msg);
                    }

                    if(msg.type == "GUESS"){
                        document.getElementById("messages").innerHTML += JSON.stringify(msg)+"\n";
                    }

                    if(msg.type == "PLAYER_JOINED"){
                        document.getElementById("messages").innerHTML += JSON.stringify(msg)+"\n";
                    }

                    if(msg.type === "CHAT"){
                        document.getElementById("messages").innerHTML += msg.sender + ": " + msg.content + "\n";
                    }

                    if(msg.type === "CORRECT_GUESS"){
                        document.getElementById("messages").innerHTML += "🎉 " + msg.content + "\n";

                    }

                    if(msg.type == "ROUND_START"){
                        document.getElementById("guessWord").innerHTML = "Drawer: " + msg.drawer;
                        drawer = msg.drawer;
                    }

                    if(msg.type == "ROUND_END"){
                        drawer = "";
                    }

                });

                // AFTER connection → join room
                stompClient.send("/app/room", {}, JSON.stringify({
                    type: "JOIN_ROOM",
                    roomId: "room12",
                    sender: username
                }));

            }
        );
    }

    function joinAlice(){
        username = "Alice";
        roomId = "room12";
        connect();
    }

    function joinBob(){
        username = "Bob";
        roomId = "room12";
        connect();
    }

    function startGame(){
        stompClient.send("/app/start", {}, JSON.stringify({
            roomId:"room12"
        }));
    }

    let canvas = document.getElementById("drawBoard");
    let ctx = canvas.getContext("2d");

    let drawing = false;

    canvas.addEventListener("mousedown",(event) => {
        drawing = true;
        let rect = canvas.getBoundingClientRect();
        prevX = event.clientX - rect.left;
        prevY = event.clientY - rect.top;

        });
    canvas.addEventListener("mouseup", () => {
        drawing = false;
        prevX = null;
        prevY = null;

        });
    canvas.addEventListener("mousemove", function(event){

        if(!drawing) return;


        let rect = canvas.getBoundingClientRect();
        let x = event.clientX - rect.left;
        let y = event.clientY - rect.top;

        if(prevX === null || prevY === null){
            prevX = x;
            prevY = y;
            return;
        }

        if(username != drawer) return;

        stompClient.send("/app/draw",{},JSON.stringify({
            type: "DRAW_EVENT",
            roomId: "room12",
            sender: username,
            drawer : drawer,
            x: x,
            y: y,
            prevX : prevX,
            prevY :prevY,
            color: "black",
            thickness: 4
        }));

        prevX = x;
        prevY = y;
    });

    function drawPoint(msg){


        ctx.fillStyle = msg.color;
        ctx.lineWidth = msg.thickness;
        ctx.lineCap = "round";

        ctx.beginPath();
        ctx.moveTo(msg.prevX,msg.prevY);
        ctx.lineTo(msg.x,msg.y);
        ctx.stroke();
    }

    function handleSubmit(event){

        event.preventDefault();

        let guess = document.getElementById("guess").value;

        if(!stompClient) return;

        stompClient.send("/app/guess",{},JSON.stringify({
            type:"GUESS",
            roomId:"room12",
            sender:username,
            content:guess
        }));

        document.getElementById("guess").value = "";
    }

</script>

</body>
</html>
