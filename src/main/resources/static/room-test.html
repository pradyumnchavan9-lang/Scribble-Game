<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>

<body>

<h2>Scribble Game Test</h2>

<button onclick="connect()">Connect</button>
<button onclick="joinAlice()">Join as Alice</button>
<button onclick="joinBob()">Join as Bob</button>

<pre id="messages"></pre>
<canvas id = "drawBoard" width = "800" height = "600"></canvas>

<form onSubmit = "handleSubmit(event)">
    <label>Guess Word: </label>
    <input id = "guess" type = "text" placeholder="Enter your Guess"/>
    <button type = "Submit">Guess</button>
</form>

<script>

    let stompClient = null;


    function connect() {

        let socket = new SockJS("http://localhost:8080/ws");
        stompClient = Stomp.over(socket);


        stompClient.connect({},function(frame){

            console.log("Connected" + frame);

            //Join room
            stompClient.subscribe("/topic/room",function(message){
                let msg = JSON.parse(message.body);
                document.getElementById("messages").innerHTML += JSON.stringify(msg)+"\n";
            });

            //Draw
            stompClient.subscribe("/topic/room/room123",function(message){
                let msg = JSON.parse(message.body);


                //Draw
                if(msg.type == "DRAW_EVENT"){
                    drawPoint(msg);
                }

                //Guess
                if(msg.type == "GUESS"){
                    document.getElementById("messages").innerHTML += JSON.stringify(msg)+"\n";
                }
            });
        });
    }

    let username = "";

    function joinAlice() {
        username = "Alice";
        stompClient.send("/app/room", {}, JSON.stringify({
            type: "JOIN_ROOM",
            roomId: "room123",
            sender: "Alice"
        }));

    }

    function joinBob() {
        username = "Bob";
        stompClient.send("/app/room", {}, JSON.stringify({
            type: "JOIN_ROOM",
            roomId: "room123",
            sender: "Bob"
        }));

    }

    //Draw Board request send
    let canvas = document.getElementById("drawBoard");
    let ctx = canvas.getContext("2d");

    let drawing = false;

    canvas.addEventListener("mousedown",() => drawing = true);
    canvas.addEventListener("mouseup", () => drawing = false);
    canvas.addEventListener("mousemove", function(event){

        if(!drawing) return;

        let rect = canvas.getBoundingClientRect();
        let x = event.clientX - rect.left;
        let y = event.clientY - rect.top;

        if(username == "") return ;
        stompClient.send("/app/draw",{},JSON.stringify({
            type: "DRAW_EVENT",
            roomId: "room123",
            sender: username,
            x: x,
            y: y,
            color: "black",
            thickness: 4
        }));

    });

    //Draw response
    function drawPoint(msg){

        ctx.fillStyle = msg.color;
        ctx.beginPath();
        ctx.arc(msg.x,msg.y,msg.thickness,0,2 * Math.PI);
        ctx.fill();
    }

    //Guess Request
    function handleSubmit(event){
        event.preventDefault();
        let guess = document.getElementById("guess").value;
        if(!stompClient) return ;
        stompClient.send("/app/guess",{},JSON.stringify({
            type:"GUESS",
            roomId:"room123",
            sender:username,
            content:guess
        }));

        document.getElementById("guess").value = "";
    }

</script>

</body>
</html>
