<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>

<body>

<h2>Scribble Game Test</h2>

<button onclick="connect()">Connect</button>
<button onclick="joinAlice()">Join as Alice</button>
<button onclick="joinBob()">Join as Bob</button>

<pre id="messages"></pre>

<script>

    let stompClient = null;

    function connect() {

        let socket = new SockJS("http://localhost:8080/ws");
        stompClient = Stomp.over(socket);

        stompClient.connect({},function(frame){

            console.log("Connected" + frame);
            stompClient.subscribe("/topic/room",function(message){
                let msg = JSON.parse(message.body);
                document.getElementById("messages").innerHtml+=JSON.stringify(msg)+"\n";
            });
        });
    }

    function joinAlice() {

        stompClient.send("/app/room", {}, JSON.stringify({
            type: "JOIN_ROOM",
            roomId: "room123",
            sender: "Alice"
        }));

    }

    function joinBob() {

        stompClient.send("/app/room", {}, JSON.stringify({
            type: "JOIN_ROOM",
            roomId: "room123",
            sender: "Bob"
        }));

    }

</script>

</body>
</html>
